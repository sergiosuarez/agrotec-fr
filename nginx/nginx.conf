# =============================================================================
# nginx reverse proxy publico Agrotec
# - Termina TLS para los 2 subdominios
# - Enruta a los servicios internos por nombre de contenedor
# - Pensado para deploy 'llave en mano' al cliente
#
# Antes de usar:
#   sed -i 's/agrotec.tudominio.com/agrotec.dominio-real.com/g' nginx.conf
#   sed -i 's/mergin.tudominio.com/mergin.dominio-real.com/g'   nginx.conf
# =============================================================================

# Healthcheck local (usado por el healthcheck del propio contenedor)
server {
    listen 80 default_server;
    server_name _;
    location /health { return 200 "ok\n"; add_header Content-Type text/plain; }
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 404; }
}

# -----------------------------------------------------------------------------
# Agrotec - subdominio principal
# -----------------------------------------------------------------------------

server {
    listen 80;
    server_name agrotec.tudominio.com;
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl;
    http2 on;
    server_name agrotec.tudominio.com;

    ssl_certificate     /etc/letsencrypt/live/agrotec.tudominio.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/agrotec.tudominio.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    client_max_body_size 500M;

    # GeoServer (rasters + vectoriales OGC)
    location /geoserver/ {
        proxy_pass http://nginx4agrotec:80/geoserver/;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
    }

    # THREDDS (NetCDF del modelo GFS)
    location /thredds/ {
        proxy_pass http://agrotec_thredds:8080/thredds/;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # API REST del visor (FastAPI)
    location /api/ {
        proxy_pass http://agrotec_visor:8000/api/;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Geovisor MapLibre (UI)
    location /visor/ {
        proxy_pass http://agrotec_visor:8000/;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Static y docs del visor (para /api en Swagger UI)
    location /static/ {
        proxy_pass http://agrotec_visor:8000/static/;
        proxy_set_header Host              $host;
    }
    location /docs {
        proxy_pass http://agrotec_visor:8000/docs;
        proxy_set_header Host              $host;
    }
    location /openapi.json {
        proxy_pass http://agrotec_visor:8000/openapi.json;
        proxy_set_header Host              $host;
    }
    location = /health {
        proxy_pass http://agrotec_visor:8000/health;
        proxy_set_header Host              $host;
    }

    # Todo lo demas -> GeoNode (catalogo, MapStore, admin Django)
    location / {
        proxy_pass http://nginx4agrotec:80/;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
    }
}

# -----------------------------------------------------------------------------
# Mergin Maps - subdominio para QField sync
# -----------------------------------------------------------------------------

server {
    listen 80;
    server_name mergin.tudominio.com;
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl;
    http2 on;
    server_name mergin.tudominio.com;

    ssl_certificate     /etc/letsencrypt/live/mergin.tudominio.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mergin.tudominio.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    client_max_body_size 500M;

    location / {
        proxy_pass http://mergin_proxy:8080;
        proxy_set_header Host              $host;
