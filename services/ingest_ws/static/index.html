      label.innerText = `${vesselLabel}Foto ${index + 1} de ${state.currentPhotos.length}`;

      modal.style.display = 'flex';

      // Update arrow visibility
      document.querySelector('.modal-btn.prev').style.display = state.currentPhotos.length > 1 ? 'flex' : 'none';
      document.querySelector('.modal-btn.next').style.display = state.currentPhotos.length > 1 ? 'flex' : 'none';
    }

    function closePhotoModal() {
      document.getElementById('photo-modal').style.display = 'none';
    }

    function changePhoto(offset) {
      if (!state.currentPhotos.length) return;
      let newIdx = state.currentPhotoIndex + offset;
      if (newIdx < 0) newIdx = state.currentPhotos.length - 1;
      if (newIdx >= state.currentPhotos.length) newIdx = 0;
      openPhotoModal(newIdx);
    }

    // Keyboard support for modal
    window.addEventListener('keydown', (e) => {
      const modal = document.getElementById('photo-modal');
      if (modal && modal.style.display === 'flex') {
        if (e.key === 'Escape') closePhotoModal();
        if (e.key === 'ArrowLeft') changePhoto(-1);
        if (e.key === 'ArrowRight') changePhoto(1);
      }
    });

    function renderStructuredData(data, depth = 0) {
      if (data === null || data === undefined) return '<div class="kv-empty">Sin datos disponibles</div>';
      if (Array.isArray(data)) {
        if (!data.length) return '<div class="kv-empty">Sin registros</div>';
        if (typeof data[0] === 'object' && data[0] !== null && depth < 2) {
          const columns = Array.from(new Set(data.flatMap(item => Object.keys(item || {}))));
          const header = columns.map(c => `<th>${formatLabel(c)}</th>`).join('');
          const rows = data.map(item => `<tr>${columns.map(c => `<td>${formatValue(item?.[c], depth + 1)}</td>`).join('')}</tr>`).join('');
          return `<table class="kv-table"><thead><tr>${header}</tr></thead><tbody>${rows}</tbody></table>`;
        }
        return `<ul>${data.map(item => `<li>${formatValue(item, depth + 1)}</li>`).join('')}</ul>`;
      }
      if (typeof data === 'object') {
        const entries = Object.entries(data);
        if (!entries.length) return '<div class="kv-empty">Sin datos disponibles</div>';

        let gridHtml = '<div style="display:grid; grid-template-columns:repeat(auto-fill, minmax(200px, 1fr)); gap:16px; padding-bottom:12px;">';
        entries.forEach(([key, val]) => {
          gridHtml += `
           <div style="border-bottom:1px solid #f1f5f9; padding-bottom:8px;">
             <div style="font-size:11px; text-transform:uppercase; letter-spacing:0.05em; color:#0ea5e9; font-weight:700; margin-bottom:4px;">${formatLabel(key)}</div>
             <div style="font-size:15px; color:#334155; font-weight:600; word-break:break-word; line-height:1.4;">${formatValue(val, depth + 1)}</div>
           </div>`;
        });
        gridHtml += '</div>';
        return gridHtml;
      }
      return `<p>${formatValue(data, depth)}</p>`;
    }

    function getVesselPopupHTML(feature) {
      if (!feature) return '';

      const coords = feature.geometry?.coordinates || [];

      const matricula = props.matricula ? `(${props.matricula})` : '';

      const lat = Number.isFinite(coords[1]) ? toDMS(coords[1], true) : '-';
      const lon = Number.isFinite(coords[0]) ? toDMS(coords[0], false) : '-';
      const sog = props.sog_knots != null ? `${Number(props.sog_knots).toFixed(1)} kn` : '-';

      const cogValue = props.cog_deg != null ? Number(props.cog_deg) : null;
      const cogText = cogValue == null ? '-' : `${cogValue.toFixed(0)}°`;
      const arrow = cogValue == null ? '' : headingArrowHTML(cogValue, { size: 12, margin: 4 });

      const ts = fmtTs(props.ts);

      return `
        <div style="min-width:180px; color:#1e293b; font-family:sans-serif;">

    function formatLabel(key) {
      if (!key) return '';
      return key.replace(/_/g, ' ').replace(/\b\w/g, ch => ch.toUpperCase());
    }

    function formatValue(value, depth = 0) {
      if (value === null || value === undefined || value === '') return '-';
      if (Array.isArray(value) || (typeof value === 'object' && value !== null)) {
        if (depth > 2) return JSON.stringify(value);
        return renderStructuredData(value, depth);
      }
      if (typeof value === 'boolean') return value ? 'Sí' : 'No';
      if (typeof value === 'number') {
        return Number.isFinite(value) ? value.toLocaleString('es-EC', { maximumFractionDigits: value % 1 === 0 ? 0 : 3 }) : '-';
      }
      if (typeof value === 'string') {
        const trimmed = value.trim();
        if (trimmed === '') return '-';
        const isoMatch = /^\d{4}-\d{2}-\d{2}/.test(trimmed);
        if (isoMatch && !isNaN(Date.parse(trimmed))) {
          return new Date(trimmed).toLocaleString('es-EC');
        }
        return trimmed;
      }
      return String(value);
    }

    async function setProjectionState(enabled, minutes) {
      state.projection.enabled = enabled;
      state.projection.minutes = minutes;

      const controls = document.getElementById('proj-controls');
      if (controls) controls.style.display = enabled ? 'block' : 'none';

      const srcId = 'projection-src';
      const layerId = 'projection-layer';
      const loadingDiv = document.getElementById('proj-loading');
      const progressBar = document.getElementById('proj-progress-bar');

      if (!enabled) {
        if (map.getLayer(layerId)) map.removeLayer(layerId);
        if (map.getSource(srcId)) map.removeSource(srcId);
        if (loadingDiv) loadingDiv.style.display = 'none';
        return;
      }

      const projTargetId = state.currentNaveId || state.currentMMSI;
      if (!projTargetId) return;

      try {
        // Show progress bar
        if (loadingDiv && progressBar) {
          loadingDiv.style.display = 'block';
          progressBar.style.width = '30%';
        }

        const url = state.currentNaveId
          ? `/api/v1/vessels/by-id/${state.currentNaveId}/projection?minutes=${minutes}`
          : `/api/v1/vessels/${state.currentMMSI}/projection?minutes=${minutes}`;
        const res = await fetch(url);

        if (progressBar) progressBar.style.width = '70%';

        const geojson = await res.json();

        if (progressBar) progressBar.style.width = '100%';

        if (map.getSource(srcId)) {
          map.getSource(srcId).setData(geojson);
        } else {
          map.addSource(srcId, { type: 'geojson', data: geojson });
          map.addLayer({
            id: layerId,
            type: 'line',
            source: srcId,
            layout: {
              'line-join': 'round',
              'line-cap': 'round'
            },
            paint: {
              'line-color': ['get', 'color'],
              'line-width': 4,
              'line-dasharray': [2, 1]
            }
          });
        }

        // Hide progress bar after completion
        setTimeout(() => {
          if (loadingDiv) loadingDiv.style.display = 'none';
          if (progressBar) progressBar.style.width = '0%';
        }, 300);

      } catch (err) {
        console.error("Error fetching projection", err);
        if (loadingDiv) loadingDiv.style.display = 'none';
        if (progressBar) progressBar.style.width = '0%';
      }
    }

    function renderTable(headers, rows, targetEl, rowHandler) {

      if (rowHandler) {
        targetEl.querySelectorAll('tbody tr').forEach(tr => {
          tr.addEventListener('click', (event) => {
            const i = Number(tr.dataset.idx);
            // Check if clicked target is the map button
            const mapBtn = (event.target).closest('.goto-map');
            if (mapBtn) {
              event.stopPropagation();
              const nid = mapBtn.dataset.id;
              focusVessel(nid);
              return;
            }
            rowHandler(rows[i]);
          });
        });
      }
    }

    function renderAlertsTable() {
      const q = (bottomSearchEl?.value || '').toLowerCase();
      const alerts = (state.alerts || []).filter(r => {
        if (!q) return true;
        return Object.values(r || {}).some(v => String(v || '').toLowerCase().includes(q));
      });

      if (!alerts.length) {
        alertsTableEl.innerHTML = '<div class="kv-empty" style="padding:16px; text-align:center;">Sin alertas activas</div>';
        return;
      }

      const cardsHtml = alerts.map(r => {
        const sev = String(r.severidad || '').toLowerCase();
        const sevClass = sev.includes('crit') ? 'critico' : sev.includes('medio') ? 'medio' : 'otro';
        const sevLabel = r.severidad || 'Alerta';

        return `
      <div class="alert-card">
        <div class="alert-card-header">
          <div class="alert-vessel-name">${r.nave_name || 'Desconocido'} <span style="font-weight:400; color:#64748b;">(${r.nave_id || '-'})</span></div>
          <div class="alert-time">${r.create_date || '-'}</div>
        </div>
        
        <div class="alert-body">
          <div style="margin-bottom:4px;">
            <span class="badge ${sevClass}">${sevLabel}</span>
            <span style="font-weight:600; color:#334155; margin-left:6px;">${r.evento_tipo || 'Evento'}</span>
          </div>
          <div style="color:#475569;">
            ${r.reparto || ''} - MMSI: ${r.nave_mmsi || '-'}
          </div>
        </div>
        
        <div class="alert-footer">
          <button class="alert-action-btn goto-map" data-nave="${r.nave_id || ''}" data-mmsi="${r.nave_mmsi || ''}">
            📍 Localizar en Mapa
          </button>
        </div>
      </div>
    `;
      }).join('');

      alertsTableEl.innerHTML = cardsHtml;

      alertsTableEl.querySelectorAll('.goto-map').forEach(btn => {
        btn.addEventListener('click', (ev) => {
          ev.stopPropagation();
          const nid = btn.dataset.nave;
          const mmsi = btn.dataset.mmsi;
          focusVessel(nid, mmsi);
        });
      });
    }

    function renderVesselsTable() {
      if (!vesselsTableEl) return;
      const q = (bottomSearchEl?.value || '').toLowerCase();
      const vessels = Object.values(state.vessels || {});
      const headers = [
        { key: 'status_dot', label: '' }, // Empty label for dot column
        { key: 'goto', label: 'Ver' },
        { key: 'analyze', label: 'Analizar' },
        { key: 'nave_id', label: 'Nave ID' },
        { key: 'mmsi', label: 'MMSI' },
        { key: 'name', label: 'Nombre' },
        { key: 'matricula', label: 'Matrícula' },
        { key: 'sog_knots', label: 'Velocidad' },
        { key: 'cog_deg', label: 'Rumbo' },
        { key: 'ts', label: 'Fecha' },
      ];
      const rows = vessels.map(v => {
        const p = v.properties || {};
        const color = p.color || '#9ca3af';
        return {
          status_dot: `<span class="status-dot" style="background-color: ${color}" title="${p.status_color || 'Unknown'}"></span>`,
          nave_id: p.nave_id || '',
          mmsi: p.mmsi || '',
          name: p.name || '',
          matricula: p.matricula || '',
          sog_knots: p.sog_knots != null ? Number(p.sog_knots).toFixed(1) : '',
          cog_deg: p.cog_deg != null ? `${headingArrowHTML(Number(p.cog_deg), { size: 12, margin: 4 })}${Number(p.cog_deg).toFixed(0)}` : '',
          ts: p.ts ? fmtTs(p.ts) : '',
          goto: `<button class="icon-btn goto-map" title="Ir al mapa" data-id="${p.nave_id || ''}">🗺️</button>`,
          analyze: `<input type="checkbox" class="analysis-chk" data-id="${p.nave_id || ''}" ${state.analysisSelection.has(String(p.nave_id)) ? 'checked' : ''}>`
        };
      }).filter(r => {
        if (!q) return true;
        return Object.values(r).some(v => String(v || '').toLowerCase().includes(q));
      });
      renderTable(headers, rows, vesselsTableEl, (row) => {
        focusVessel(row.nave_id, row.mmsi);
      });
      // Bind checkbox events
      vesselsTableEl.querySelectorAll('.analysis-chk').forEach(chk => {
        chk.addEventListener('click', (e) => {
          e.stopPropagation();
          toggleAnalysisVessel(chk.dataset.id, chk.checked);
        });
      });
    }

    function toggleAnalysisVessel(id, checked) {
      if (!id) return;
      if (checked) {
        if (state.analysisSelection.size >= 4) {
          alert("Máximo 4 embarcaciones permitidas para análisis.");
          // Revert check
          const el = document.querySelector(`.analysis-chk[data-id="${id}"]`);
          if (el) el.checked = false;
          return;
        }
        state.analysisSelection.add(id);
      } else {
        state.analysisSelection.delete(id);
      }
      updateAnalysisUI();
    }

    function updateAnalysisUI() {
      const controls = document.getElementById('analysis-controls');
      if (state.analysisSelection.size > 0 && state.analysisSelection.size <= 4) {
        controls.style.display = 'block';
      } else {
        controls.style.display = 'none';
      }
    }

    async function runAnalysis() {
      const startVal = document.getElementById('analysis-start').value;
      const endVal = document.getElementById('analysis-end').value;
      if (!startVal || !endVal) {
        alert("Seleccione fecha inicial y final");
        return;
      }
      const startTs = new Date(startVal).getTime() / 1000;
      const endTs = (new Date(endVal).getTime() / 1000) + 86400; // End of day included

      const ids = Array.from(state.analysisSelection).join(',');
      const btn = document.getElementById('btn-analyze');
      const originalText = btn.textContent;
      btn.textContent = 'Cargando...';
      btn.disabled = true;

      try {
        const res = await fetch(`/api/v1/analysis/history?ids=${ids}&start=${startTs}&end=${endTs}`);
        const geojson = await res.json();

        // Draw on map
        const sourceId = 'analysis-source';
        if (map.getSource(sourceId)) {
          map.getSource(sourceId).setData(geojson);
        } else {
          map.addSource(sourceId, { type: 'geojson', data: geojson });

          // Add line layer for tracks
          map.addLayer({
            id: 'analysis-layer-line',
            type: 'line',
            source: sourceId,
            filter: ['==', ['get', 'feature_type'], 'track_line'],
            layout: { 'line-join': 'round', 'line-cap': 'round' },
            paint: {
              'line-color': ['get', 'color'],
              'line-width': 4
            }
          });

          // Add point layer for interactive tooltips
          map.addLayer({
            id: 'analysis-layer-points',
            type: 'circle',
            source: sourceId,
            filter: ['==', ['get', 'feature_type'], 'track_point'],
            paint: {
              'circle-radius': 4,
              'circle-color': ['get', 'color'],
              'circle-opacity': 0,  // Invisible by default
              'circle-stroke-width': 0
            }
          });

          // Add hover effect for points
          map.on('mouseenter', 'analysis-layer-points', (e) => {
            map.getCanvas().style.cursor = 'pointer';

            const feature = e.features[0];
            const props = feature.properties;
            const coords = feature.geometry.coordinates.slice();

            // Format timestamp
            let timeStr = '-';
            if (props.timestamp) {
              try {
                const d = new Date(props.timestamp);
                timeStr = d.toLocaleString('es-EC', {
                  year: 'numeric',
                  month: '2-digit',
                  day: '2-digit',
                  hour: '2-digit',
                  minute: '2-digit',
                  second: '2-digit'
                });
              } catch (err) {
                timeStr = props.timestamp;
              }
            }

            const html = `
              <div style="min-width:160px; color:#1e293b; font-family:sans-serif;">
                <div style="font-weight:700; color:#0f172a; margin-bottom:4px; font-size:13px;">
                  ${props.name || 'Embarcación'}
                </div>
                <div style="font-size:11px; display:grid; grid-template-columns:auto 1fr; gap:3px 10px;">
                  <span style="color:#64748b;">Nave ID:</span> <strong>${props.nave_id || '-'}</strong>
                  <span style="color:#64748b;">Fecha/Hora:</span> <strong>${timeStr}</strong>
                </div>
              </div>
            `;

            new maplibregl.Popup({ closeButton: false, closeOnClick: false })
              .setLngLat(coords)
              .setHTML(html)
              .addTo(map);
          });

          map.on('mouseleave', 'analysis-layer-points', () => {
            map.getCanvas().style.cursor = '';
            // Remove popup
            const popups = document.getElementsByClassName('maplibregl-popup');
            if (popups.length) {
              popups[0].remove();
            }
          });
        }
      } catch (e) {
        console.error(e);
        alert("Error al analizar historial");
      } finally {
        btn.textContent = originalText;
        btn.disabled = false;
      }
    }

    function clearAnalysisLayers() {
      state.analysisSelection.clear();
      updateAnalysisUI();
      // Uncheck boxes
      document.querySelectorAll('.analysis-chk').forEach(c => c.checked = false);
      const sourceId = 'analysis-source';
      if (map.getSource(sourceId)) {
        map.getSource(sourceId).setData({ type: 'FeatureCollection', features: [] });
      }
      // Remove any lingering popups
      const popups = document.getElementsByClassName('maplibregl-popup');
      while (popups.length) {
        popups[0].remove();
      }
    }

    function focusVessel(naveId, mmsi) {
      let feature = null;
      if (naveId && state.vessels[naveId]) {
        feature = state.vessels[naveId];
      } else if (mmsi) {
        feature = Object.values(state.vessels).find(f => String(f.properties?.mmsi) === String(mmsi));
      }
      if (!feature) return;
      const coords = feature.geometry?.coordinates;
      if (coords && Number.isFinite(coords[0]) && Number.isFinite(coords[1])) {
        map.easeTo({ center: coords, zoom: Math.max(map.getZoom(), 12) });

        // Show popup
        new maplibregl.Popup({ closeButton: false, closeOnClick: true })
          .setLngLat(coords)
          .setHTML(getVesselPopupHTML(feature))
          .addTo(map);
      }
      state.currentNaveId = feature.properties?.nave_id ? String(feature.properties.nave_id) : null;
      state.currentMMSI = feature.properties?.mmsi ? String(feature.properties.mmsi) : null;
      updateRealtimeSummary(feature);
      setFichaVisibility(true);
      setBottomTab('ficha');
      openBottomPanel();
      setActiveTab('basic');
      loadVesselCard({ naveId: state.currentNaveId, mmsi: state.currentMMSI }, 'basic');
    }

    function openBottomPanel() {
      state.bottomOpen = true;
      bottomPanelEl?.classList.remove('hidden');
      if (bottomToggleEl) {
        bottomToggleEl.textContent = 'Información y Alertas ▾';
        bottomToggleEl.classList.add('over-panel');
      }
    }

    function closeBottomPanel() {
      state.bottomOpen = false;
      bottomPanelEl?.classList.add('hidden');
      if (bottomToggleEl) {
        bottomToggleEl.textContent = 'Información y Alertas ▴';
        bottomToggleEl.classList.remove('over-panel');
      }
    }

    function setBottomTab(tab) {
      state.bottomTab = tab;
      bottomTabButtons.forEach(btn => {
        if (btn.dataset.btab === tab) btn.classList.add('active');
        else btn.classList.remove('active');
      });
      bottomTabFicha?.classList.toggle('active', tab === 'ficha');
      bottomTabAlerts?.classList.toggle('active', tab === 'alerts');
      bottomTabVessels?.classList.toggle('active', tab === 'vessels');
      if (bottomSearchEl) {
        bottomSearchEl.style.display = tab === 'ficha' ? 'none' : '';
      }
      refreshBottomTab();
    }

    function refreshBottomTab() {
      if (state.bottomTab === 'ficha') {
        return;
      } else if (state.bottomTab === 'alerts') {
        if (!state.alertsLoaded) {
          loadIncidentAlerts(bottomSearchEl?.value || '');
        } else {
          renderAlertsTable();
        }
      } else {
        renderVesselsTable();
      }
    }

    console.log("Registering load event listener");
    window.addEventListener('load', () => {
      console.log("Window loaded, calling ensureLogin");
      ensureLogin();
    });
  </script>
  <!-- Photo Modal Structure -->
  <div id="photo-modal" onclick="if(event.target === this) closePhotoModal()">
    <span id="photo-modal-close" onclick="closePhotoModal()">&times;</span>
    <button class="modal-btn prev" onclick="changePhoto(-1)">&#10094;</button>
    <div id="photo-modal-content">
      <img id="photo-modal-img" src="" alt="Vessel Photo">
      <div id="photo-modal-label">Foto X de Y</div>
    </div>
    <button class="modal-btn next" onclick="changePhoto(1)">&#10095;</button>
  </div>
</body>
