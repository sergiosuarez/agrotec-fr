<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Agrotec — Geovisor</title>
    <link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet">
    <style>
        :root {
            --agro-green: #2e7d32;
            --agro-green-dark: #1b5e20;
            --agro-bg: #f1f5f0;
            --agro-panel: #ffffffd0;
            --agro-text: #1a1a1a;
        }
        * { box-sizing: border-box; }
        html, body { margin: 0; height: 100%; font-family: system-ui, -apple-system, sans-serif; color: var(--agro-text); }
        #app { display: grid; grid-template-columns: 320px 1fr; height: 100vh; }

        #sidebar {
            background: var(--agro-bg);
            padding: 1rem;
            overflow-y: auto;
            border-right: 1px solid #c8d4c5;
        }
        #sidebar h1 { font-size: 1.3rem; margin: 0 0 .25rem; color: var(--agro-green-dark); }
        #sidebar .subtitle { font-size: .85rem; color: #555; margin: 0 0 1rem; }
        #sidebar section { margin-bottom: 1.5rem; }
        #sidebar h2 { font-size: .9rem; text-transform: uppercase; letter-spacing: .05em; color: var(--agro-green-dark); margin: 0 0 .5rem; padding-bottom: .25rem; border-bottom: 1px solid #c8d4c5; }

        .layer-item { display: flex; align-items: center; padding: .35rem 0; font-size: .9rem; gap: .5rem; }
        .layer-item input[type="checkbox"] { accent-color: var(--agro-green); }
        .layer-item .name { flex: 1; }
        .layer-item .fit-btn {
            background: none; border: 1px solid var(--agro-green); color: var(--agro-green);
            padding: 2px 6px; font-size: .75rem; border-radius: 3px; cursor: pointer;
        }
        .layer-item .fit-btn:hover { background: var(--agro-green); color: white; }

        .opacity-row { display: flex; align-items: center; gap: .5rem; font-size: .8rem; color: #555; padding-left: 1.5rem; }
        .opacity-row input[type="range"] { flex: 1; accent-color: var(--agro-green); }

        .status { font-size: .8rem; color: #555; padding: .25rem 0; }
        .status .badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: .7rem; font-weight: 600; }
        .badge.ok   { background: #c8e6c9; color: var(--agro-green-dark); }
        .badge.down { background: #ffcdd2; color: #b71c1c; }

        #map { width: 100%; height: 100%; }
        .ml-info {
            position: absolute; bottom: 10px; left: 10px;
            background: var(--agro-panel); padding: 4px 10px; font-size: .75rem;
            border-radius: 4px; backdrop-filter: blur(4px);
        }
        footer { font-size: .7rem; color: #888; margin-top: 1rem; }
        a { color: var(--agro-green); }
        button.primary {
            background: var(--agro-green); color: white; border: none; padding: 6px 12px;
            border-radius: 4px; cursor: pointer; font-size: .85rem;
        }
        button.primary:hover { background: var(--agro-green-dark); }
    </style>
</head>
<body>
<div id="app">
    <aside id="sidebar">
        <h1>🌱 Agrotec</h1>
        <p class="subtitle">Geovisor agrícola</p>

        <section>
            <h2>Mapa base</h2>
            <div class="layer-item">
                <input type="radio" name="basemap" id="bm-osm" value="osm" checked>
                <label class="name" for="bm-osm">OpenStreetMap</label>
            </div>
            <div class="layer-item">
                <input type="radio" name="basemap" id="bm-sat" value="esri-sat">
                <label class="name" for="bm-sat">Satélite (Esri)</label>
            </div>
        </section>

        <section>
            <h2>Ortomosaicos drone</h2>
            <div id="orthos-list"><em style="color:#888">cargando…</em></div>
        </section>

        <section>
            <h2>Meteorología (GFS)</h2>
            <div id="gfs-status" class="status">cargando…</div>
        </section>

        <section>
            <h2>Estado servicios</h2>
            <div id="health" class="status">cargando…</div>
        </section>

        <footer>
            <a href="/docs" target="_blank">API docs</a> ·
            <a href="/agrotec-geonode/" target="_blank">GeoNode admin</a>
        </footer>
    </aside>

    <main style="position: relative;">
        <div id="map"></div>
        <div class="ml-info" id="coords">Esperando mapa…</div>
    </main>
</div>

<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
<script>
// ============================================================================
// Geovisor Agrotec — MapLibre GL JS
// ============================================================================

const API_BASE = '';   // mismo origen
const WMS_BASE = 'https://agrotec.desarrollowebsite.com/geoserver/ows';

// Bbox aproximado del set inicial AP_TEMP (Ecuador, Zamora-Chinchipe)
const DEFAULT_CENTER = [-79.864, -3.167];
const DEFAULT_ZOOM   = 17;

// --- Mapa base styles ---
const BASEMAPS = {
    'osm': {
        version: 8,
        sources: {
            osm: {
                type: 'raster',
                tiles: ['https://tile.openstreetmap.org/{z}/{x}/{y}.png'],
                tileSize: 256,
                attribution: '© OpenStreetMap contributors',
            }
        },
        layers: [{ id: 'osm-tiles', type: 'raster', source: 'osm' }]
    },
    'esri-sat': {
        version: 8,
        sources: {
            esri: {
                type: 'raster',
                tiles: ['https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}'],
                tileSize: 256,
                attribution: '© Esri, Maxar, Earthstar Geographics',
            }
        },
        layers: [{ id: 'esri-tiles', type: 'raster', source: 'esri' }]
    }
};

const map = new maplibregl.Map({
    container: 'map',
    style: BASEMAPS.osm,
    center: DEFAULT_CENTER,
    zoom: DEFAULT_ZOOM,
});
map.addControl(new maplibregl.NavigationControl(), 'top-right');
map.addControl(new maplibregl.ScaleControl(), 'bottom-right');
map.on('mousemove', e => {
    document.getElementById('coords').textContent =
        `${e.lngLat.lat.toFixed(5)}, ${e.lngLat.lng.toFixed(5)} — zoom ${map.getZoom().toFixed(1)}`;
});

// Cambio de mapa base preservando overlays WMS
document.querySelectorAll('input[name="basemap"]').forEach(el => {
    el.addEventListener('change', () => {
        const newStyle = JSON.parse(JSON.stringify(BASEMAPS[el.value]));
        // copiar overlays activos al nuevo estilo
        for (const [id, info] of Object.entries(activeWmsLayers)) {
            if (info.visible) {
                newStyle.sources[id] = wmsSource(info.alternate);
                newStyle.layers.push({
                    id, type: 'raster', source: id,
                    paint: { 'raster-opacity': info.opacity }
                });
            }
        }
        map.setStyle(newStyle);
    });
});

// --- WMS overlays ---
const activeWmsLayers = {};   // { 'ortho-1': { alternate, visible, opacity } }

function wmsSource(alternate) {
    const url = `${WMS_BASE}?service=WMS&version=1.1.0&request=GetMap`
              + `&layers=${alternate}&styles=&format=image/png&transparent=true`
              + `&srs=EPSG:3857&bbox={bbox-epsg-3857}&width=512&height=512`;
    return {
        type: 'raster',
        tiles: [url],
        tileSize: 512,
        attribution: 'Agrotec / GeoServer',
    };
}

function addWmsLayer(id, alternate, opacity = 1) {
    if (map.getLayer(id)) map.removeLayer(id);
    if (map.getSource(id)) map.removeSource(id);
    map.addSource(id, wmsSource(alternate));
    map.addLayer({ id, type: 'raster', source: id, paint: { 'raster-opacity': opacity } });
    activeWmsLayers[id] = { alternate, visible: true, opacity };
}

function removeWmsLayer(id) {
    if (map.getLayer(id)) map.removeLayer(id);
    if (map.getSource(id)) map.removeSource(id);
    if (activeWmsLayers[id]) activeWmsLayers[id].visible = false;
}

function setOpacity(id, opacity) {
    if (map.getLayer(id)) map.setPaintProperty(id, 'raster-opacity', opacity);
    if (activeWmsLayers[id]) activeWmsLayers[id].opacity = opacity;
}

// --- Bootstrap: cargar ortomosaicos + GFS + health ---
async function loadOrthos() {
    const list = document.getElementById('orthos-list');
    try {
        const r = await fetch(`${API_BASE}/api/v1/ortomosaicos?sync=true`);
        const orthos = await r.json();
        if (!orthos.length) { list.innerHTML = '<em>(sin ortomosaicos)</em>'; return; }
        list.innerHTML = '';
        orthos.forEach((o, i) => {
            const id = `ortho-${i}`;
            const row = document.createElement('div');
            row.className = 'layer-item';
            row.innerHTML = `
                <input type="checkbox" id="${id}-cb">
                <label class="name" for="${id}-cb">${o.geonode_alternate.replace('geonode:', '')}</label>
                <button class="fit-btn" data-alt="${o.geonode_alternate}">⊕</button>
            `;
            list.appendChild(row);
            const opRow = document.createElement('div');
            opRow.className = 'opacity-row';
            opRow.innerHTML = `<span>opacidad</span><input type="range" id="${id}-op" min="0" max="100" value="100">`;
            opRow.style.display = 'none';
            list.appendChild(opRow);

            row.querySelector(`#${id}-cb`).addEventListener('change', e => {
                if (e.target.checked) {
                    addWmsLayer(id, o.geonode_alternate);
                    opRow.style.display = 'flex';
                } else {
                    removeWmsLayer(id);
                    opRow.style.display = 'none';
                }
            });
            opRow.querySelector('input').addEventListener('input', e => {
                setOpacity(id, e.target.value / 100);
            });
            row.querySelector('.fit-btn').addEventListener('click', () => {
                // Vuelve a la vista por defecto (centroide AP_TEMP)
                map.flyTo({ center: DEFAULT_CENTER, zoom: DEFAULT_ZOOM });
            });
        });
    } catch (e) {
        list.innerHTML = `<em style="color:#c00">error: ${e.message}</em>`;
    }
}

async function loadGFS() {
    const el = document.getElementById('gfs-status');
    try {
        const r = await fetch(`${API_BASE}/api/v1/gfs/status`);
        const d = await r.json();
        if (!d.available) {
            el.innerHTML = '<span class="badge down">no disponible</span>';
            return;
        }
        const mod = new Date(d.last_modified).toLocaleString();
        const fileLinks = d.files.map(f =>
            `<a href="${f.thredds_url}" target="_blank">${f.name}</a> (${(f.size_bytes/1024).toFixed(0)} KB)`
        ).join('<br>');
        el.innerHTML = `
            <span class="badge ok">disponible</span><br>
            <small>actualizado: ${mod}</small><br>
            ${fileLinks}
        `;
    } catch (e) {
        el.innerHTML = `<em style="color:#c00">error: ${e.message}</em>`;
    }
}

async function loadHealth() {
    const el = document.getElementById('health');
    try {
        const r = await fetch(`${API_BASE}/health`);
        const d = await r.json();
        el.innerHTML = ['db', 'geonode', 'thredds'].map(k =>
            `<div>${k}: <span class="badge ${d[k] === 'ok' ? 'ok' : 'down'}">${d[k]}</span></div>`
        ).join('');
    } catch (e) {
        el.innerHTML = `<em style="color:#c00">error: ${e.message}</em>`;
    }
}

map.on('load', () => {
    loadOrthos();
    loadGFS();
    loadHealth();
});
</script>
</body>
</html>
