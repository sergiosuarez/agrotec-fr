<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Administrador de capas</title>
  <style>
    :root {
      color-scheme: light dark;
    }

    body {
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      margin: 0;
      background: #0f172a;
      color: #e2e8f0;
    }

    header {
      padding: 12px 16px;
      background: #0b1220;
      border-bottom: 1px solid #1f2937;
    }

    h1 {
      margin: 0;
      font-size: 18px;
      font-weight: 600;
    }

    main {
      padding: 16px;
      max-width: 720px;
      margin: 0 auto;
    }

    .card {
      background: #111827;
      border: 1px solid #1f2937;
      border-radius: 10px;
      padding: 14px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
    }

    .actions {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }

    button {
      padding: 8px 12px;
      border: 1px solid #2563eb;
      background: #2563eb;
      color: white;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
    }

    button.secondary {
      background: transparent;
      border-color: #374151;
      color: #e2e8f0;
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    #status {
      font-size: 13px;
      margin-bottom: 10px;
      color: #93c5fd;
      min-height: 18px;
    }

    ul {
      list-style: none;
      padding: 0;
      margin: 0;
      display: grid;
      gap: 6px;
    }

    li {
      padding: 8px 10px;
      border: 1px solid #1f2937;
      border-radius: 8px;
      display: flex;
      align-items: center;
      gap: 8px;
      background: #0f172a;
    }

    label {
      display: flex;
      align-items: center;
      gap: 8px;
      width: 100%;
      cursor: pointer;
    }

    .title {
      font-weight: 600;
    }

    .small {
      font-size: 12px;
      color: #9ca3af;
    }
  </style>
</head>

<body>
  <header>
    <h1>Administrador de capas (GeoNode)</h1>
  </header>
  <main>
    <div class="card">
      <div id="status"></div>
      <div class="actions">
        <button id="save-btn">Guardar selección</button>
        <button id="refresh-btn" class="secondary">Refrescar lista</button>
      </div>

      <ul id="layer-list"></ul>
    </div>
  </main>

  <script>
    const statusEl = document.getElementById('status');
    const listEl = document.getElementById('layer-list');
    const saveBtn = document.getElementById('save-btn');
    const refreshBtn = document.getElementById('refresh-btn');


    let selected = new Set();
    let available = [];

    function setStatus(msg, ok = true) {
      statusEl.textContent = msg || '';
      statusEl.style.color = ok ? '#93c5fd' : '#f87171';
    }

    function render() {
      listEl.innerHTML = '';
      if (!available.length) {
        listEl.innerHTML = '<li class="small">Sin capas disponibles desde GeoNode.</li>';
        return;
      }
      available.forEach(l => {
        const li = document.createElement('li');
        const label = document.createElement('label');
        const cb = document.createElement('input');
        cb.type = 'checkbox';
        cb.checked = selected.has(l.typename);
        cb.addEventListener('change', () => {
          if (cb.checked) selected.add(l.typename); else selected.delete(l.typename);
        });
        const title = document.createElement('span');
        title.className = 'title';
        title.textContent = l.title || l.name;
        const meta = document.createElement('span');
        meta.className = 'small';
        meta.textContent = l.typename;
        label.append(cb, title, meta);
        li.append(label);
        listEl.append(li);
      });
    }

    async function load() {
      setStatus('Cargando capas...');
      saveBtn.disabled = true;
      refreshBtn.disabled = true;

      try {

        const resp = await fetch('/api/v1/layers/available?refresh=1');
        if (!resp.ok) throw new Error('HTTP ' + resp.status);
        const data = await resp.json();
        available = data.available || [];
        selected = new Set(data.selected || []);
        render();
        setStatus(`Capas cargadas (${available.length}). Seleccionadas: ${selected.size}.`);
      } catch (err) {
        console.error(err);
        setStatus('No se pudieron cargar las capas.', false);
      } finally {
        saveBtn.disabled = false;
        refreshBtn.disabled = false;

      }
    }

    async function save() {
      setStatus('Guardando selección...');
      saveBtn.disabled = true;
      try {
        const resp = await fetch('/api/v1/layers/selection', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ layers: Array.from(selected) }),
        });
        if (!resp.ok) throw new Error('HTTP ' + resp.status);
        setStatus('Selección guardada. Refresca el visor para ver cambios.');
      } catch (err) {
        console.error(err);
        setStatus('No se pudo guardar la selección.', false);
      } finally {
        saveBtn.disabled = false;
      }
    }



    saveBtn.addEventListener('click', save);
    refreshBtn.addEventListener('click', load);

    load();
  </script>
</body>

</html>
