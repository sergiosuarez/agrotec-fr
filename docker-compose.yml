services:
  db:
    image: postgis/postgis:16-3.4
    container_name: agrotec_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    expose:
      - "5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d
    networks:
      - agrotec-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    container_name: agrotec_redis
    restart: unless-stopped
    command: ["redis-server", "--save", "60", "1000", "--appendonly", "yes"]
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    networks:
      - agrotec-net

  visor:
    build:
      context: ./services/ingest_ws
    container_name: agrotec_visor
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@agrotec_db:5432/${POSTGRES_DB}
      REDIS_URL: redis://agrotec_redis:6379
    expose:
      - "8000"
    volumes:
      - ./services/ingest_ws:/app
    command: ["bash", "uvicorn.sh"]
    networks:
      - agrotec-net

volumes:
  db_data:
    name: agrotec-fr-dbdata
  redis_data:
    name: agrotec-fr-redisdata

networks:
  agrotec-net:
    name: agrotec-net
    external: true
