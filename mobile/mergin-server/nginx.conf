# nginx interno de Mergin: combina la SPA (web) y la API (server) en un solo
# puerto :8080 para que el reverse proxy externo solo deba apuntar a `proxy:8080`.

server {
    listen 8080;
    server_name _;

    client_max_body_size 200M;

    # ---- API backend (Flask) ----
    # /v1/ y /v2/ = API REST publica (clientes externos, QField, Python SDK)
    # /app/      = API que usa el frontend SPA (Vue) — login, registro, etc.
    location /v1/  { proxy_pass http://server:5000; proxy_set_header Host $host; proxy_set_header X-Forwarded-Proto $scheme; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_read_timeout 600s; }
    location /v2/  { proxy_pass http://server:5000; proxy_set_header Host $host; proxy_set_header X-Forwarded-Proto $scheme; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_read_timeout 600s; }
    location /app/ { proxy_pass http://server:5000; proxy_set_header Host $host; proxy_set_header X-Forwarded-Proto $scheme; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_read_timeout 600s; }
    location /ping     { proxy_pass http://server:5000; }
    location /config   { proxy_pass http://server:5000; }

    # ---- SPA (frontend Vue) ----
    location / {
        proxy_pass http://web:8080/;
        proxy_set_header Host $host;
    }
}
