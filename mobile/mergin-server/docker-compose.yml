# =============================================================================
# Mergin Maps server - Community Edition
# Basado en deployment/community/docker-compose.yml del repo oficial
# https://github.com/MerginMaps/server
# =============================================================================

services:
  db:
    image: postgres:14
    container_name: mergin_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - mergin_pgdata:/var/lib/postgresql/data
    networks:
      - mergin-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:6.2.17
    container_name: mergin_redis
    restart: unless-stopped
    networks:
      - mergin-net

  server:
    image: lutraconsulting/merginmaps-backend:${MERGIN_VERSION}
    container_name: mergin_server
    restart: unless-stopped
    user: "901:999"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    env_file: .env
    environment:
      # Gunicorn debe bindear 0.0.0.0:5000 para que el proxy lo alcance.
      # Override del bind por defecto (127.0.0.1:8000) del config.py interno.
      GUNICORN_CMD_ARGS: "--bind=0.0.0.0:5000"
    volumes:
      - mergin_projects:/data
    expose:
      - "5000"
    command: ["gunicorn --config config.py application:application"]
    networks:
      - mergin-net

  celery-beat:
    image: lutraconsulting/merginmaps-backend:${MERGIN_VERSION}
    container_name: mergin_celery_beat
    restart: unless-stopped
    depends_on:
      - server
      - redis
    env_file: .env
    environment:
      GEVENT_WORKER: "0"
      NO_MONKEY_PATCH: "1"
    command: ["celery -A application.celery beat --loglevel=info"]
    networks:
      - mergin-net

  celery-worker:
    image: lutraconsulting/merginmaps-backend:${MERGIN_VERSION}
    container_name: mergin_celery_worker
    restart: unless-stopped
    user: "901:999"
    depends_on:
      - server
      - redis
      - celery-beat
    env_file: .env
    environment:
      GEVENT_WORKER: "0"
      NO_MONKEY_PATCH: "1"
    volumes:
      - mergin_projects:/data
    command: ["celery -A application.celery worker --loglevel=info"]
    networks:
      - mergin-net

  web:
    image: lutraconsulting/merginmaps-frontend:${MERGIN_VERSION}
    container_name: mergin_web
    restart: unless-stopped
    user: "101:999"
    depends_on:
      - server
    networks:
      - mergin-net

  # Proxy interno que junta API (server) + SPA (web). El TLS lo termina
  # un reverse proxy externo (streamtrack-nginx-1) en mergin.desarrollowebsite.com.
  proxy:
    image: nginxinc/nginx-unprivileged:1.27
    container_name: mergin_proxy
    restart: unless-stopped
    depends_on:
      - server
      - web
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    expose:
      - "8080"
    networks:
      - mergin-net

volumes:
  mergin_pgdata:
    name: mergin-pgdata
  mergin_projects:
    name: mergin-projects

networks:
  mergin-net:
    name: mergin-net
    driver: bridge
